<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Login & Sign Up</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
<a href="index.html" class="back">← Kembali</a>
<div class="container" id="container">
  
  
  <!-- Sign Up -->
  <div class="form-container sign-up">
    <form id="signupForm">
      <h2>Sign Up</h2>
      <input type="text" id="suName" placeholder="Nama Pengguna" required>
      <input type="email" id="suEmail" placeholder="Email" required>
      <input type="password" id="suPassword" placeholder="Password" required>
      <button type="submit">Sign Up</button>
    </form>
  </div>

  <!-- Login -->
  <div class="form-container sign-in">
    <form id="loginForm">
      <h2>Login</h2>
      <input type="email" id="liEmail" placeholder="Email" required>
      <input type="password" id="liPassword" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>
  </div>

  <!-- Overlay -->
  <div class="overlay-container">
    <div class="overlay">
      <div class="overlay-panel left">
        <h2>Sudah punya akun?</h2>
        <button id="signIn">Login</button>
      </div>
      <div class="overlay-panel right">
        <h2>Belum punya akun?</h2>
        <button id="signUp">Sign Up</button>
      </div>
    </div>
  </div>

</div>

<script src="login.js"></script>
</body>
</html>
